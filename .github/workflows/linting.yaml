name: Linting

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  spotless:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-java@v5.2.0
        with:
          java-version: 21
          distribution: 'temurin'
          cache: gradle
       #----------------------------------------------
      - name: Run Spotless
        run: ./gradlew clean spotlessApply

  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
       #----------------------------------------------
      - uses: j178/prek-action@v2.0.2
