name: Testing

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  gradle-tests:
    strategy:
      fail-fast: false
      matrix:
        java-version:
          - 21
          - 25
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-java@v5.2.0
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: gradle
       #----------------------------------------------
      - name: Run Gradle tests
        run: ./gradlew clean test
